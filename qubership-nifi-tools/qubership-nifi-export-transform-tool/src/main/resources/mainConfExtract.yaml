processorTypes:
  - org.apache.nifi.processors.standard.ExecuteSQL:
      SQL Query: sql_query.sql  # regexp
  - org.qubership.nifi.processors.QueryDatabaseToJsonWithMerge:
      db-fetch-sql-query: db_fetch_sql_query.json
  - org.apache.nifi.processors.standard.PutSQL:
      SQL Statement: sql_statement.sql
  - org.apache.nifi.processors.groovyx.ExecuteGroovyScript:
      Script Body: script_body.groovy
  - org.apache.nifi.processors.jolt.JoltTransformJSON:
      Jolt Specification: jolt_spec.json
  - org.qubership.nifi.processors.FetchTableToJson:
      custom-query: custom_query.sql
