---
name: python-tests

on:
  push:
    paths:
      - '.claude/skills/apply-upgrade-advisor-recommendations/scripts/**'
      - '.claude/skills/apply-upgrade-advisor-recommendations/tests/**'
      - '.github/workflows/upgrade-advisor-python-test.yml'
  pull_request:
    paths:
      - '.claude/skills/apply-upgrade-advisor-recommendations/scripts/**'
      - '.claude/skills/apply-upgrade-advisor-recommendations/tests/**'
      - '.github/workflows/upgrade-advisor-python-test.yml'
  workflow_dispatch: null

permissions:
  contents: read

jobs:
  python-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '.claude/skills/apply-upgrade-advisor-recommendations/tests/requirements-test.txt'

      - name: Install dependencies
        run: python3 -m pip install --require-hashes -r .claude/skills/apply-upgrade-advisor-recommendations/tests/requirements-test.txt

      - name: Run pytest
        run: python3 -m pytest .claude/skills/apply-upgrade-advisor-recommendations/tests --junitxml=pytest-results.xml

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-test-results
          path: pytest-results.xml
          retention-days: 2
